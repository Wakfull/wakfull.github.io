
<div class="container">
  <div class="content">
    <div class="text-center">
      <h2> Bienvenue sur {{siteName}} ! </h2>
      <p>
        Le but de {{siteName}} est de proposer une aide aux joueurs débutants et chevronnés en partageant des guides, stuffs ou autres informations autours du jeu WAKFU !
      </p>
    </div>

    <div class="row">
      @for (preview of previews; track preview) {
        <app-preview class="col-md-4 mb-4"
          [title]="preview.title"
          [description]="preview.description"
          [link]="preview.link"
          [backgroundImage]="preview.backgroundImage"
          >
        </app-preview>
      }
    </div>
  </div>
</div>
